<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StudySync</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

  <!-- Background Animation -->
  <div class="auth-bg">
    <div class="gradient-bg"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="auth-container">
    <div class="auth-card">
      
      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">📚</span>
        <h1>StudySync</h1>
        <p>Welcome back!</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="auth-form">
        
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="your@email.com" 
            required
          >
          <small class="error-text" id="emailError"></small>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Enter your password" 
            required
          >
          <small class="error-text" id="passwordError"></small>
        </div>

        <!-- Remember Me -->
        <div class="form-remember">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Login
        </button>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner" style="display: none;"></div>

      </form>

      <!-- Register Link -->
      <p class="auth-link">
        No account yet? <a href="register.html">Register here</a>
      </p>

    </div>
  </div>

  <!-- Error/Success Message -->
  <div id="messageBox" class="message-box"></div>

  <!-- Script -->
  <script type="module">
    import { loginUser, redirectIfLoggedIn } from "../js/auth.js";

    // Check if already logged in
    redirectIfLoggedIn();

    // Login Form Handler
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      // Get values
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      // Validate
      if (!email || !password) {
        showMessage("❌ सभी fields भरो!", "error");
        return;
      }

      // Show loading
      document.getElementById("loadingSpinner").style.display = "block";
      document.getElementById("loginBtn").disabled = true;

      try {
        // Call login function from auth.js
        const result = await loginUser(email, password);

        if (result.success) {
          showMessage("✅ Login successful! Dashboard पर जा रहे हो...", "success");
          setTimeout(() => {
            window.location.href = "../dashboard/dashboard.html";
          }, 1500);
        } else {
          showMessage("❌ Error: " + result.error, "error");
          document.getElementById("loadingSpinner").style.display = "none";
          document.getElementById("loginBtn").disabled = false;
        }
      } catch (err) {
        showMessage("❌ कुछ गड़बड़ हुई: " + err.message, "error");
        document.getElementById("loadingSpinner").style.display = "none";
        document.getElementById("loginBtn").disabled = false;
      }
    });

    // Show message function
    function showMessage(message, type) {
      const box = document.getElementById("messageBox");
      box.textContent = message;
      box.className = "message-box " + type;
      box.style.display = "block";

      if (type === "error") {
        setTimeout(() => {
          box.style.display = "none";
        }, 5000);
      }
    }

    // Remember me functionality
    document.getElementById("loginForm").addEventListener("submit", () => {
      if (document.getElementById("remember").checked) {
        localStorage.setItem("rememberEmail", document.getElementById("email").value);
      }
    });

    // Load remembered email
    const rememberEmail = localStorage.getItem("rememberEmail");
    if (rememberEmail) {
      document.getElementById("email").value = rememberEmail;
      document.getElementById("remember").checked = true;
    }
  </script>

</body>
</html>
